<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABS Timecode Shifter</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS_PLACEHOLDER */
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-container">
        <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <div class="logo-text">
          <h1>ABS Timecode Shifter</h1>
          <p>Sync & shift timecodes in your doc</p>
        </div>
      </div>
    </header>

    <!-- Scope Selector Section -->
    <section class="section-panel">
      <h2 class="section-title">
        <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Scope
      </h2>
      <div class="segmented-control" id="scope-control">
        <button class="segment-btn active" data-value="selection">Only Selection</button>
        <button class="segment-btn" data-value="from-selection">From Cursor to End</button>
        <button class="segment-btn" data-value="document">Entire Doc</button>
      </div>
    </section>

    <!-- Shift Mode Section -->
    <section class="section-panel">
      <div class="tabs-control">
        <button class="tab-btn active" data-tab="tab-amount">Shift by Amount</button>
        <button class="tab-btn" data-tab="tab-align" id="tab-align-trigger">Align First Timecode</button>
      </div>

      <div class="tab-content active" id="tab-amount">
        <div class="input-group">
          <label>Shift Direction</label>
          <div class="direction-toggle-container">
            <button class="dir-btn active" id="dir-forward" data-dir="1">
              <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
              </svg>
              Forward (+)
            </button>
            <button class="dir-btn" id="dir-backward" data-dir="-1">
              <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
              </svg>
              Backward (-)
            </button>
          </div>
        </div>

        <div class="input-group">
          <label>Shift Duration</label>
          <div class="timecode-input-row">
            <div class="input-box">
              <input type="number" id="input-h" min="0" max="99" placeholder="00" value="0">
              <span>H</span>
            </div>
            <div class="colon">:</div>
            <div class="input-box">
              <input type="number" id="input-m" min="0" max="59" placeholder="00" value="0">
              <span>M</span>
            </div>
            <div class="colon">:</div>
            <div class="input-box">
              <input type="number" id="input-s" min="0" max="59" placeholder="00" value="0">
              <span>S</span>
            </div>
            <div class="colon" id="subsecond-separator">:</div>
            <div class="input-box">
              <input type="number" id="input-sub" min="0" max="59" placeholder="00" value="0">
              <span id="subsecond-label">F</span>
            </div>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-align">
        <div class="detected-info-box">
          <div class="detected-label">Detected First Timecode in Scope:</div>
          <div class="detected-value-row">
            <span class="value" id="detected-timecode">None detected</span>
            <button class="btn-icon" id="btn-scan" title="Scan Document">
              <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label for="input-target">Change Target First Timecode To</label>
          <div class="target-input-container">
            <input type="text" id="input-target" placeholder="e.g. 01:00:00:00" disabled>
            <span class="input-hint">Will auto-format to match original style</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Advanced Settings Section -->
    <section class="section-panel collapsible-panel">
      <button class="collapsible-header" id="btn-toggle-adv">
        <span class="title">
          <svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
          Advanced Settings
        </span>
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <div class="collapsible-content" id="adv-content">
        <div class="input-group" id="group-framerate">
          <label for="select-framerate">Frame Rate (fps)</label>
          <select id="select-framerate">
            <option value="23.976">23.976 fps</option>
            <option value="24" selected>24 fps</option>
            <option value="25">25 fps</option>
            <option value="29.97">29.97 fps</option>
            <option value="30">30 fps</option>
            <option value="50">50 fps</option>
            <option value="59.94">59.94 fps</option>
            <option value="60">60 fps</option>
          </select>
        </div>

        <div class="input-group-row" id="group-dropframe" style="display: none;">
          <div class="checkbox-container">
            <input type="checkbox" id="check-dropframe" checked>
            <label for="check-dropframe">Use Drop-Frame Math</label>
          </div>
        </div>
      </div>
    </section>

    <!-- Run Action -->
    <div class="action-panel">
      <button class="btn-primary" id="btn-run">
        <span class="btn-text">Shift Timecodes</span>
        <div class="btn-loader" style="display: none;">
          <svg class="spinner" width="20" height="20" viewBox="0 0 50 50">
            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
          </svg>
        </div>
      </button>
    </div>

    <!-- Status panel -->
    <div class="status-panel" id="status-card">
      <div class="status-header">
        <div class="status-indicator idle" id="status-indicator"></div>
        <span class="status-title" id="status-title">Ready</span>
      </div>
      <p class="status-desc" id="status-desc">Click "Shift Timecodes" to begin.</p>
    </div>
  </div>

  <script>
    /* JS_PLACEHOLDER */
  </script>
</body>
</html>
